$schema: "http://json-schema.org/draft-07/schema#"
title: sl.cross_system_phi.contract.v1
type: object
additionalProperties: false
required:
  - payload_version
  - motif_family
  - versioning_note
  - systems
  - meta_contract_ref
  - latent_graphs
  - provenance_rule
  - provenance_index
  - mappings
  - meta_validation_report
  - mismatch_report
properties:
  payload_version:
    type: string
    const: sl.cross_system_phi.contract.v1
  motif_family:
    type: string
    minLength: 1
  versioning_note:
    type: string
    minLength: 1
  systems:
    type: array
    minItems: 2
    maxItems: 2
    items:
      type: object
      additionalProperties: false
      required:
        - system_id
        - promoted_basis_ref
        - authority_scope
      properties:
        system_id:
          type: string
          minLength: 1
        promoted_basis_ref:
          type: string
          minLength: 1
        authority_scope:
          type: string
          minLength: 1
        notes:
          type: [string, "null"]
  meta_contract_ref:
    type: string
    minLength: 1
  latent_graphs:
    type: array
    minItems: 2
    maxItems: 2
    items:
      type: object
      additionalProperties: false
      required:
        - system_id
        - graph_ref
        - graph_version
        - promoted_basis_ref
        - fact_node_count
        - motif_node_count
        - edge_count
        - constraint_count
      properties:
        system_id:
          type: string
          minLength: 1
        graph_ref:
          type: string
          minLength: 1
        graph_version:
          type: string
          const: sl.latent_promoted_graph.v1
        promoted_basis_ref:
          type: string
          minLength: 1
        fact_node_count:
          type: integer
          minimum: 1
        motif_node_count:
          type: integer
          minimum: 1
        edge_count:
          type: integer
          minimum: 1
        constraint_count:
          type: integer
          minimum: 1
  provenance_rule:
    type: object
    additionalProperties: false
    required:
      - rule_id
      - description
      - source_anchor_required
      - target_anchor_required
    properties:
      rule_id:
        type: string
        minLength: 1
      description:
        type: string
        minLength: 1
      source_anchor_required:
        type: boolean
      target_anchor_required:
        type: boolean
  provenance_index:
    type: array
    minItems: 2
    items:
      type: object
      additionalProperties: false
      required:
        - provenance_ref
        - system_id
        - run_id
        - event_id
        - predicate_key
        - source_document_id
        - source_char_start
        - source_char_end
        - event_text
      properties:
        provenance_ref:
          type: string
          minLength: 1
        system_id:
          type: string
          minLength: 1
        run_id:
          type: string
          minLength: 1
        event_id:
          type: string
          minLength: 1
        predicate_key:
          type: string
          minLength: 1
        source_document_id:
          type: string
          minLength: 1
        source_char_start:
          type: integer
          minimum: 0
        source_char_end:
          type: integer
          minimum: 0
        event_text:
          type: string
          minLength: 1
  mappings:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - mapping_id
        - source_system
        - target_system
        - source_ref
        - target_ref
        - status
        - compatibility_rationale
        - provenance_refs
        - meta_validation
        - mapping_explanation
      properties:
        mapping_id:
          type: string
          minLength: 1
        source_system:
          type: string
          minLength: 1
        target_system:
          type: string
          minLength: 1
        source_ref:
          type: string
          minLength: 1
        target_ref:
          type: [string, "null"]
        status:
          type: string
          enum:
            - exact
            - partial
            - incompatible
            - undefined
        compatibility_rationale:
          type: string
          minLength: 1
        provenance_refs:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        meta_validation:
          type: object
          additionalProperties: false
          required:
            - allowed
            - meta_score
            - type_score
            - role_score
            - authority_score
            - constraint_status
            - scope_status
            - violations
            - witness_requirements
          properties:
            allowed:
              type: boolean
            meta_score:
              type: number
              minimum: 0
              maximum: 1
            type_score:
              type: number
              minimum: 0
              maximum: 1
            role_score:
              type: number
              minimum: 0
              maximum: 1
            authority_score:
              type: number
              minimum: 0
              maximum: 1
            constraint_status:
              type: string
              enum:
                - compatible
                - incompatible
                - unknown
                - conditional
            scope_status:
              type: string
              minLength: 1
            violations:
              type: array
              items:
                type: string
                minLength: 1
            witness_requirements:
              type: array
              items:
                type: string
                minLength: 1
            left_type:
              type: string
            right_type:
              type: string
            left_authority:
              type: string
            right_authority:
              type: string
            witness:
              type: object
              additionalProperties: false
              required:
                - type_alignment
                - role_alignments
                - authority_alignment
                - constraint_check
                - scope_check
              properties:
                type_alignment:
                  type: object
                  additionalProperties: false
                  required: [left_type, right_type, relation, score, summary]
                  properties:
                    left_type: {type: [string, "null"]}
                    right_type: {type: [string, "null"]}
                    relation: {type: string, minLength: 1}
                    score: {type: number, minimum: 0, maximum: 1}
                    summary: {type: string, minLength: 1}
                role_alignments:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    required: [left_role, right_role, relation, score]
                    properties:
                      left_role: {type: string, minLength: 1}
                      right_role: {type: [string, "null"]}
                      relation: {type: string, minLength: 1}
                      score: {type: number, minimum: 0, maximum: 1}
                authority_alignment:
                  type: object
                  additionalProperties: false
                  required: [left_authority, right_authority, relation, score, summary]
                  properties:
                    left_authority: {type: [string, "null"]}
                    right_authority: {type: [string, "null"]}
                    relation: {type: string, minLength: 1}
                    score: {type: number, minimum: 0, maximum: 1}
                    summary: {type: string, minLength: 1}
                constraint_check:
                  type: object
                  additionalProperties: false
                  required: [left_constraint, right_constraint, status]
                  properties:
                    left_constraint: {type: [string, "null"]}
                    right_constraint: {type: [string, "null"]}
                    status: {type: string, minLength: 1}
                scope_check:
                  type: object
                  additionalProperties: false
                  required: [status, left_domain, right_domain]
                  properties:
                    status: {type: string, minLength: 1}
                    left_domain: {type: [string, "null"]}
                    right_domain: {type: [string, "null"]}
        mapping_explanation:
          type: object
          additionalProperties: false
          required:
            - source_predicate
            - target_predicate
            - source_rule_type
            - target_rule_type
            - status_basis
            - rationale
            - meta_summary
            - witness
            - latent_graph_refs
          properties:
            source_predicate:
              type: string
              minLength: 1
            target_predicate:
              type: [string, "null"]
            source_rule_type:
              type: [string, "null"]
            target_rule_type:
              type: [string, "null"]
            status_basis:
              type: string
              minLength: 1
            rationale:
              type: string
              minLength: 1
            meta_summary:
              type: object
              additionalProperties: false
              required:
                - type_relation
                - authority_relation
                - constraint_status
                - scope_status
              properties:
                type_relation: {type: [string, "null"]}
                authority_relation: {type: [string, "null"]}
                constraint_status: {type: string, minLength: 1}
                scope_status: {type: string, minLength: 1}
            witness:
              type: object
              additionalProperties: false
              required:
                - type_alignment
                - role_alignments
                - authority_alignment
                - constraint_check
                - scope_check
              properties:
                type_alignment:
                  type: object
                  additionalProperties: false
                  required: [left_type, right_type, relation, score, summary]
                  properties:
                    left_type: {type: [string, "null"]}
                    right_type: {type: [string, "null"]}
                    relation: {type: string, minLength: 1}
                    score: {type: number, minimum: 0, maximum: 1}
                    summary: {type: string, minLength: 1}
                role_alignments:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    required: [left_role, right_role, relation, score]
                    properties:
                      left_role: {type: string, minLength: 1}
                      right_role: {type: [string, "null"]}
                      relation: {type: string, minLength: 1}
                      score: {type: number, minimum: 0, maximum: 1}
                authority_alignment:
                  type: object
                  additionalProperties: false
                  required: [left_authority, right_authority, relation, score, summary]
                  properties:
                    left_authority: {type: [string, "null"]}
                    right_authority: {type: [string, "null"]}
                    relation: {type: string, minLength: 1}
                    score: {type: number, minimum: 0, maximum: 1}
                    summary: {type: string, minLength: 1}
                constraint_check:
                  type: object
                  additionalProperties: false
                  required: [left_constraint, right_constraint, status]
                  properties:
                    left_constraint: {type: [string, "null"]}
                    right_constraint: {type: [string, "null"]}
                    status: {type: string, minLength: 1}
                scope_check:
                  type: object
                  additionalProperties: false
                  required: [status, left_domain, right_domain]
                  properties:
                    status: {type: string, minLength: 1}
                    left_domain: {type: [string, "null"]}
                    right_domain: {type: [string, "null"]}
            latent_graph_refs:
              type: object
              additionalProperties: false
              required:
                - source_fact_node_ref
                - target_fact_node_ref
                - source_motif_ref
                - target_motif_ref
              properties:
                source_fact_node_ref: {type: [string, "null"]}
                target_fact_node_ref: {type: [string, "null"]}
                source_motif_ref: {type: [string, "null"]}
                target_motif_ref: {type: [string, "null"]}
        constraint_refs:
          type: array
          items:
            type: string
            minLength: 1
        mismatch_refs:
          type: array
          items:
            type: string
            minLength: 1
        reviewed_at:
          type: [string, "null"]
      allOf:
        - if:
            properties:
              status:
                const: undefined
          then:
            properties:
              target_ref:
                type: "null"
        - if:
            properties:
              status:
                enum:
                  - exact
                  - partial
                  - incompatible
          then:
            properties:
              target_ref:
                type: string
                minLength: 1
  meta_validation_report:
    type: object
    additionalProperties: false
    required:
      - blocked_pairs
      - blocked_source_refs
    properties:
      blocked_pairs:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - block_id
            - source_ref
            - candidate_target_ref
            - reason_summary
            - meta_validation
          properties:
            block_id:
              type: string
              minLength: 1
            source_ref:
              type: string
              minLength: 1
            candidate_target_ref:
              type: string
              minLength: 1
            reason_summary:
              type: string
              minLength: 1
            meta_validation:
              type: object
              additionalProperties: false
              required:
                - allowed
                - meta_score
                - type_score
                - role_score
                - authority_score
                - constraint_status
                - scope_status
                - violations
                - witness_requirements
              properties:
                allowed: {type: boolean}
                meta_score: {type: number, minimum: 0, maximum: 1}
                type_score: {type: number, minimum: 0, maximum: 1}
                role_score: {type: number, minimum: 0, maximum: 1}
                authority_score: {type: number, minimum: 0, maximum: 1}
                constraint_status:
                  type: string
                  enum: [compatible, incompatible, unknown, conditional]
                scope_status: {type: string, minLength: 1}
                violations:
                  type: array
                  items: {type: string, minLength: 1}
                witness_requirements:
                  type: array
                  items: {type: string, minLength: 1}
                left_type: {type: string}
                right_type: {type: string}
                left_authority: {type: string}
                right_authority: {type: string}
                witness:
                  type: object
                  additionalProperties: false
                  required:
                    - type_alignment
                    - role_alignments
                    - authority_alignment
                    - constraint_check
                    - scope_check
                  properties:
                    type_alignment:
                      type: object
                      additionalProperties: false
                      required: [left_type, right_type, relation, score, summary]
                      properties:
                        left_type: {type: [string, "null"]}
                        right_type: {type: [string, "null"]}
                        relation: {type: string, minLength: 1}
                        score: {type: number, minimum: 0, maximum: 1}
                        summary: {type: string, minLength: 1}
                    role_alignments:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        required: [left_role, right_role, relation, score]
                        properties:
                          left_role: {type: string, minLength: 1}
                          right_role: {type: [string, "null"]}
                          relation: {type: string, minLength: 1}
                          score: {type: number, minimum: 0, maximum: 1}
                    authority_alignment:
                      type: object
                      additionalProperties: false
                      required: [left_authority, right_authority, relation, score, summary]
                      properties:
                        left_authority: {type: [string, "null"]}
                        right_authority: {type: [string, "null"]}
                        relation: {type: string, minLength: 1}
                        score: {type: number, minimum: 0, maximum: 1}
                        summary: {type: string, minLength: 1}
                    constraint_check:
                      type: object
                      additionalProperties: false
                      required: [left_constraint, right_constraint, status]
                      properties:
                        left_constraint: {type: [string, "null"]}
                        right_constraint: {type: [string, "null"]}
                        status: {type: string, minLength: 1}
                    scope_check:
                      type: object
                      additionalProperties: false
                      required: [status, left_domain, right_domain]
                      properties:
                        status: {type: string, minLength: 1}
                        left_domain: {type: [string, "null"]}
                        right_domain: {type: [string, "null"]}
      blocked_source_refs:
        type: array
        items:
          type: string
          minLength: 1
  mismatch_report:
    type: object
    additionalProperties: false
    required:
      - workflow
      - unresolved_mapping_ids
      - incompatible_mapping_ids
      - diagnostics
    properties:
      workflow:
        type: object
        additionalProperties: false
        required:
          - workflow_id
          - default_status
          - allowed_statuses
          - triage_rule
        properties:
          workflow_id:
            type: string
            minLength: 1
          default_status:
            type: string
            enum:
              - open
              - reviewed
              - waived
          allowed_statuses:
            type: array
            minItems: 1
            items:
              type: string
              enum:
                - open
                - reviewed
                - waived
          triage_rule:
            type: string
            minLength: 1
      unresolved_mapping_ids:
        type: array
        items:
          type: string
      incompatible_mapping_ids:
        type: array
        items:
          type: string
      diagnostics:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - diagnostic_id
            - kind
            - status
            - mapping_ids
            - summary
          properties:
            diagnostic_id:
              type: string
              minLength: 1
            kind:
              type: string
              enum:
                - mismatch
                - contradiction
                - authority_boundary
            status:
              type: string
              enum:
                - open
                - reviewed
                - waived
            mapping_ids:
              type: array
              minItems: 1
              items:
                type: string
                minLength: 1
            summary:
              type: string
              minLength: 1
            provenance_refs:
              type: array
              items:
                type: string
                minLength: 1
