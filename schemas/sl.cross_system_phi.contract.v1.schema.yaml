$schema: "http://json-schema.org/draft-07/schema#"
title: sl.cross_system_phi.contract.v1
type: object
additionalProperties: false
required:
  - payload_version
  - motif_family
  - systems
  - provenance_rule
  - provenance_index
  - mappings
  - mismatch_report
properties:
  payload_version:
    type: string
    const: sl.cross_system_phi.contract.v1
  motif_family:
    type: string
    minLength: 1
  systems:
    type: array
    minItems: 2
    maxItems: 2
    items:
      type: object
      additionalProperties: false
      required:
        - system_id
        - promoted_basis_ref
        - authority_scope
      properties:
        system_id:
          type: string
          minLength: 1
        promoted_basis_ref:
          type: string
          minLength: 1
        authority_scope:
          type: string
          minLength: 1
        notes:
          type: [string, "null"]
  provenance_rule:
    type: object
    additionalProperties: false
    required:
      - rule_id
      - description
      - source_anchor_required
      - target_anchor_required
    properties:
      rule_id:
        type: string
        minLength: 1
      description:
        type: string
        minLength: 1
      source_anchor_required:
        type: boolean
      target_anchor_required:
        type: boolean
  provenance_index:
    type: array
    minItems: 2
    items:
      type: object
      additionalProperties: false
      required:
        - provenance_ref
        - system_id
        - run_id
        - event_id
        - predicate_key
        - source_document_id
        - source_char_start
        - source_char_end
        - event_text
      properties:
        provenance_ref:
          type: string
          minLength: 1
        system_id:
          type: string
          minLength: 1
        run_id:
          type: string
          minLength: 1
        event_id:
          type: string
          minLength: 1
        predicate_key:
          type: string
          minLength: 1
        source_document_id:
          type: string
          minLength: 1
        source_char_start:
          type: integer
          minimum: 0
        source_char_end:
          type: integer
          minimum: 0
        event_text:
          type: string
          minLength: 1
  mappings:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - mapping_id
        - source_system
        - target_system
        - source_ref
        - target_ref
        - status
        - compatibility_rationale
        - provenance_refs
      properties:
        mapping_id:
          type: string
          minLength: 1
        source_system:
          type: string
          minLength: 1
        target_system:
          type: string
          minLength: 1
        source_ref:
          type: string
          minLength: 1
        target_ref:
          type: [string, "null"]
        status:
          type: string
          enum:
            - exact
            - partial
            - incompatible
            - undefined
        compatibility_rationale:
          type: string
          minLength: 1
        provenance_refs:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        constraint_refs:
          type: array
          items:
            type: string
            minLength: 1
        mismatch_refs:
          type: array
          items:
            type: string
            minLength: 1
        reviewed_at:
          type: [string, "null"]
      allOf:
        - if:
            properties:
              status:
                const: undefined
          then:
            properties:
              target_ref:
                type: "null"
        - if:
            properties:
              status:
                enum:
                  - exact
                  - partial
                  - incompatible
          then:
            properties:
              target_ref:
                type: string
                minLength: 1
  mismatch_report:
    type: object
    additionalProperties: false
    required:
      - workflow
      - unresolved_mapping_ids
      - incompatible_mapping_ids
      - diagnostics
    properties:
      workflow:
        type: object
        additionalProperties: false
        required:
          - workflow_id
          - default_status
          - allowed_statuses
          - triage_rule
        properties:
          workflow_id:
            type: string
            minLength: 1
          default_status:
            type: string
            enum:
              - open
              - reviewed
              - waived
          allowed_statuses:
            type: array
            minItems: 1
            items:
              type: string
              enum:
                - open
                - reviewed
                - waived
          triage_rule:
            type: string
            minLength: 1
      unresolved_mapping_ids:
        type: array
        items:
          type: string
      incompatible_mapping_ids:
        type: array
        items:
          type: string
      diagnostics:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - diagnostic_id
            - kind
            - status
            - mapping_ids
            - summary
          properties:
            diagnostic_id:
              type: string
              minLength: 1
            kind:
              type: string
              enum:
                - mismatch
                - contradiction
                - authority_boundary
            status:
              type: string
              enum:
                - open
                - reviewed
                - waived
            mapping_ids:
              type: array
              minItems: 1
              items:
                type: string
                minLength: 1
            summary:
              type: string
              minLength: 1
            provenance_refs:
              type: array
              items:
                type: string
                minLength: 1
