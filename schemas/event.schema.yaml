$schema: "http://json-schema.org/draft-07/schema#"
type: object
required:
  - type
  - data
properties:
  type:
    const: event
    type: string
  data:
    type: object
    required:
      - label
      - event_kind
    properties:
      label:
        type: string
      event_kind:
        type: string
      wrong_type_id:
        type: integer
        description: "Wrong type anchor; legal_system_id is inferred from this relation."
      occurred_at:
        type: string
        format: date-time
      valid_from:
        type: string
        format: date-time
      valid_to:
        type: string
        format: date-time
      address_id:
        type: integer
        description: Existing address primary key to attach the event to.
      address:
        type: object
        description: Structured postal/location fields used to populate address records.
        properties:
          address_line1:
            type: string
          address_line2:
            type: string
          city:
            type: string
          state_province:
            type: string
          postal_code:
            type: string
          country_code:
            type: string
        additionalProperties: false
      location:
        type: string
        description: Deprecated free-text location; prefer address/address_id.
        deprecated: true
      metadata:
        type: object
        additionalProperties: true
    additionalProperties: false
additionalProperties: false
