$schema: "http://json-schema.org/draft-07/schema#"
title: sl.source_unit.v1
type: object
additionalProperties: false
required:
  - schema_version
  - source_units
properties:
  schema_version:
    type: string
    const: sl.source_unit.v1
  source_units:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - source_id
        - entity_qid
        - source_unit_id
        - revision
        - origin
        - content
      properties:
        source_id:
          type: string
          minLength: 1
        entity_qid:
          type: string
          minLength: 1
        source_unit_id:
          type: string
          minLength: 1
        revision:
          type: object
          additionalProperties: false
          required:
            - revision_id
            - revision_timestamp
            - retrieval_method
          properties:
            revision_id:
              type: [string, integer]
            revision_timestamp:
              type: string
              minLength: 1
            retrieval_method:
              type: string
              enum:
                - pdf_snapshot
                - html_snapshot
                - wiki_revision
                - csv_snapshot
                - chat_capture
                - other
        origin:
          type: object
          additionalProperties: false
          required:
            - source_type
          properties:
            source_type:
              type: string
              enum:
                - pdf
                - html
                - wiki
                - csv
                - chat
                - text
                - other
            source_url:
              type: [string, "null"]
            title:
              type: [string, "null"]
        content:
          type: object
          additionalProperties: false
          required:
            - format
            - text
          properties:
            format:
              type: string
              enum:
                - text
                - html
                - markdown
                - csv
                - other
            text:
              type: string
              minLength: 1
        anchors:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - anchor_id
              - start
              - end
            properties:
              anchor_id:
                type: string
                minLength: 1
              start:
                type: integer
                minimum: 0
              end:
                type: integer
                minimum: 0
              label:
                type: [string, "null"]
        metadata:
          type: object
          additionalProperties: true
