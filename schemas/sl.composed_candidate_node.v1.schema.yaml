$schema: "http://json-schema.org/draft-07/schema#"
title: sl.composed_candidate_node.v1
type: object
additionalProperties: false
required:
  - schema_version
  - kind
  - predicate_family
  - slots
  - content_refs
  - authority_wrapper
  - status
  - support_phi_ids
  - span_refs
  - provenance_receipts
  - section
  - genre
properties:
  schema_version:
    type: string
    const: sl.composed_candidate_node.v1
  kind:
    type: string
    minLength: 1
  predicate_family:
    type: string
    minLength: 1
  slots:
    type: object
    minProperties: 1
    additionalProperties: true
  content_refs:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: true
      required: [kind, value]
      properties:
        kind:
          type: string
          minLength: 1
        value:
          type: string
          minLength: 1
  authority_wrapper:
    type: object
    minProperties: 1
    additionalProperties: true
  status:
    type: string
    minLength: 1
  support_phi_ids:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  span_refs:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: true
      required: [kind, value]
      properties:
        kind:
          type: string
          minLength: 1
        value:
          type: string
          minLength: 1
  provenance_receipts:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: true
      required: [kind, value]
      properties:
        kind:
          type: string
          minLength: 1
        value:
          type: string
          minLength: 1
  section:
    type: string
    minLength: 1
  genre:
    type: string
    minLength: 1
