$schema: "http://json-schema.org/draft-07/schema#"
title: sl.wikidata.climate_text_source.v1
type: object
additionalProperties: false
required:
  - schema_version
  - sources
properties:
  schema_version:
    type: string
    const: sl.wikidata.climate_text_source.v1
  sources:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - source_id
        - entity_qid
        - source_unit_id
        - revision_id
        - revision_timestamp
        - text
      properties:
        source_id:
          type: string
          minLength: 1
        entity_qid:
          type: string
          minLength: 1
        source_unit_id:
          type: string
          minLength: 1
        revision_id:
          type: [string, integer]
        revision_timestamp:
          type: string
          minLength: 1
        source_url:
          type: [string, "null"]
        title:
          type: [string, "null"]
        text:
          type: string
          minLength: 1
