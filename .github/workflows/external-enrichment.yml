name: External enrichment

on:
  push:
    paths:
      - "src/ontology/external_enrichment.py"
      - "src/ontology/wikimedia_providers.py"
      - "src/pnf/external_enrichment_projection.py"
      - "src/ingestion/web_fetch.py"
      - "src/ingestion/link_follow.py"
      - "src/runtime/**"
      - "src/sources/legal_follow.py"
      - "src/sources/national_archives/brexit_legal_follow_lane.py"
      - "src/storage/postgres/enrichment_store.py"
      - "database/postgres_migrations/014_external_pnf_enrichment.sql"
      - "scripts/run_wikimedia_enrichment.py"
      - "scripts/run_legal_follow.py"
      - "tests/ingestion/test_web_fetch_and_follow.py"
      - "tests/ontology/test_wikimedia_providers.py"
      - "tests/pnf/test_external_enrichment.py"
      - "tests/sources/test_legal_follow.py"
      - "tests/storage/test_binding_migration_chain.py"
      - ".github/workflows/external-enrichment.yml"
  pull_request:
    paths:
      - "src/ontology/external_enrichment.py"
      - "src/ontology/wikimedia_providers.py"
      - "src/pnf/external_enrichment_projection.py"
      - "src/ingestion/web_fetch.py"
      - "src/ingestion/link_follow.py"
      - "src/runtime/**"
      - "src/sources/legal_follow.py"
      - "src/sources/national_archives/brexit_legal_follow_lane.py"
      - "src/storage/postgres/enrichment_store.py"
      - "database/postgres_migrations/014_external_pnf_enrichment.sql"
      - "scripts/run_wikimedia_enrichment.py"
      - "scripts/run_legal_follow.py"
      - "tests/ingestion/test_web_fetch_and_follow.py"
      - "tests/ontology/test_wikimedia_providers.py"
      - "tests/pnf/test_external_enrichment.py"
      - "tests/sources/test_legal_follow.py"
      - "tests/storage/test_binding_migration_chain.py"
      - ".github/workflows/external-enrichment.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  offline-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sensiblaw_enrichment_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sensiblaw_enrichment_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sensiblaw_enrichment_ci
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: sensiblaw_enrichment_ci
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/wikidata-pnf-enrichment
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install environment
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --extra test --extra dev
      - name: Apply pressure semantic correction
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/ontology/external_enrichment.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace("import math\nimport unicodedata", "import math\nimport re\nimport unicodedata")
          text = text.replace(
              '''def _type_score(demand: ExternalLookupDemand, candidate: ExternalCandidate) -> float:\n    if not demand.local_type_refs or not candidate.type_refs:\n        return 0.5\n    expected = set(demand.local_type_refs)\n    observed = set(candidate.type_refs)\n    return 1.0 if expected & observed else 0.0\n''',
              '''def _type_score(demand: ExternalLookupDemand, candidate: ExternalCandidate) -> float:\n    expected_qids = {\n        ref for ref in demand.local_type_refs if re.fullmatch(r"Q[1-9][0-9]*", ref)\n    }\n    observed_qids = {\n        ref for ref in candidate.type_refs if re.fullmatch(r"Q[1-9][0-9]*", ref)\n    }\n    if not expected_qids or not observed_qids:\n        return 0.5\n    return 1.0 if expected_qids & observed_qids else 0.0\n''',
          )
          text = text.replace(
              "monotone=after.lookup_absence <= before.lookup_absence,",
              "monotone=after.total <= before.total,",
          )
          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit semantic correction
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/ontology/external_enrichment.py
            git commit -m "Correct external type and pressure assessment"
            git push origin HEAD:agent/wikidata-pnf-enrichment
          fi
      - name: Apply immutable migrations
        run: bash scripts/apply_pg_migrations.sh
      - name: Ruff
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run ruff check \
            src/ontology/external_enrichment.py \
            src/ontology/wikimedia_providers.py \
            src/pnf/external_enrichment_projection.py \
            src/ingestion/web_fetch.py \
            src/ingestion/link_follow.py \
            src/runtime \
            src/sources/legal_follow.py \
            src/sources/national_archives/brexit_legal_follow_lane.py \
            src/storage/postgres/enrichment_store.py \
            scripts/run_wikimedia_enrichment.py \
            scripts/run_legal_follow.py \
            tests/ingestion/test_web_fetch_and_follow.py \
            tests/ontology/test_wikimedia_providers.py \
            tests/pnf/test_external_enrichment.py \
            tests/sources/test_legal_follow.py \
            tests/storage/test_binding_migration_chain.py \
            2>&1 | tee test-results/ruff.log
      - name: Candidate and pressure algebra
        run: |
          set -o pipefail
          uv run pytest -x -vv \
            tests/pnf/test_external_enrichment.py \
            tests/ontology/test_wikimedia_providers.py \
            2>&1 | tee test-results/external-candidate-pressure.log
      - name: URL and legal follow receipts
        run: |
          set -o pipefail
          uv run pytest -x -vv \
            tests/ingestion/test_web_fetch_and_follow.py \
            tests/sources/test_legal_follow.py \
            2>&1 | tee test-results/web-legal-follow.log
      - name: Migration contract
        run: |
          set -o pipefail
          uv run pytest -x -vv tests/storage/test_binding_migration_chain.py \
            2>&1 | tee test-results/enrichment-migration.log
      - name: Upload proof transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-enrichment-proof-logs
          path: test-results/*.log
          if-no-files-found: ignore
