name: Build Legal IR catalogue

on:
  workflow_dispatch:
    inputs:
      offline:
        description: Rebuild from checked-in source catalogue without network fetches
        required: false
        default: false
        type: boolean
      force_refetch:
        description: Replace persisted AustLII source bytes even when paths already exist
        required: false
        default: false
        type: boolean
      compile_workers:
        description: Document parser/persistence processes
        required: false
        default: "3"
        type: choice
        options: ["1", "2", "3", "4"]
      closure_workers:
        description: Pure closure executors inside each active document
        required: false
        default: "2"
        type: choice
        options: ["1", "2", "4", "8"]
      owner_partitions:
        description: Logical keyed owner partitions inside each document
        required: false
        default: "4"
        type: choice
        options: ["1", "2", "4", "8", "16"]
      copy_workers:
        description: Source-family copy workers
        required: false
        default: "4"
        type: choice
        options: ["1", "2", "4", "8"]

permissions:
  contents: write

concurrency:
  group: legal-ir-catalogue-au-driving
  cancel-in-progress: false

jobs:
  build-catalogue:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sensiblaw_legal_catalogue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sensiblaw_legal_catalogue"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sensiblaw_legal_catalogue
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: sensiblaw_legal_catalogue
      CATALOGUE_BRANCH: catalogue/au-driving-v1
      CATALOGUE_ROOT: .catalogue-state/au-driving-v1
    steps:
      - name: Checkout compiler branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout persisted catalogue state
        shell: bash
        run: |
          git fetch origin "$CATALOGUE_BRANCH" || true
          rm -rf "$CATALOGUE_ROOT"
          if git show-ref --verify --quiet "refs/remotes/origin/$CATALOGUE_BRANCH"; then
            git worktree add --detach "$CATALOGUE_ROOT" "origin/$CATALOGUE_BRANCH"
          else
            git worktree add --detach "$CATALOGUE_ROOT" HEAD
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install environment
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --extra test --extra dev

      - name: Restore persisted PostgreSQL catalogue
        shell: bash
        run: |
          if [ -f "$CATALOGUE_ROOT/catalogue/au-driving-v1/postgres.dump" ]; then
            pg_restore --clean --if-exists --no-owner --dbname "$DATABASE_URL" \
              "$CATALOGUE_ROOT/catalogue/au-driving-v1/postgres.dump"
          fi
          bash scripts/apply_pg_migrations.sh

      - name: Restore persisted source and Legal IR catalogue
        shell: bash
        run: |
          mkdir -p build/legal-ir-catalogue
          if [ -d "$CATALOGUE_ROOT/catalogue/au-driving-v1/state" ]; then
            cp -a "$CATALOGUE_ROOT/catalogue/au-driving-v1/state/." build/legal-ir-catalogue/
          fi

      - name: Build incremental AU legal catalogue
        shell: bash
        run: |
          args=(
            --catalogue config/legal_catalogues/au_driving_austlii_v1.json
            --output-root build/legal-ir-catalogue
            --database-url "$DATABASE_URL"
            --compile-workers "${{ inputs.compile_workers }}"
            --closure-workers "${{ inputs.closure_workers }}"
            --owner-partitions "${{ inputs.owner_partitions }}"
            --copy-workers "${{ inputs.copy_workers }}"
            --progress-jsonl
          )
          if [ "${{ inputs.offline }}" = "true" ]; then args+=(--offline); fi
          if [ "${{ inputs.force_refetch }}" = "true" ]; then args+=(--force-refetch); fi
          uv run python scripts/build_legal_ir_catalogue.py "${args[@]}"

      - name: Focused validation
        shell: bash
        run: |
          uv run ruff check \
            src/runtime/progress.py \
            src/runtime/request_governor.py \
            src/runtime/stage_timing.py \
            src/pnf/factor_proposals.py \
            src/pnf/operator_closure_benchmark.py \
            src/pnf/streaming_fixed_point.py \
            src/pnf/streaming_operator_executor.py \
            src/pnf/stage_build_keys.py \
            src/pnf/zelph_closure_executor.py \
            src/policy/operational_corpus_compilation.py \
            src/policy/streaming_postgres_corpus_compilation.py \
            src/policy/parallel_postgres_corpus_compilation.py \
            src/storage/postgres/streaming_semantic_store.py \
            scripts/build_legal_ir_catalogue.py \
            scripts/run_legal_pnf_probe.py \
            scripts/benchmark_pnf_closure_backends.py
          uv run pytest -q \
            tests/runtime/test_progress_instrumentation.py \
            tests/runtime/test_semantic_stage_timing.py \
            tests/pnf/test_factor_proposals.py \
            tests/pnf/test_streaming_fixed_point.py \
            tests/pnf/test_streaming_operator_executor.py \
            tests/pnf/test_stage_build_keys.py \
            tests/pnf/test_zelph_closure_executor.py \
            tests/pnf/test_operator_closure_benchmark.py
          uv run python scripts/benchmark_pnf_closure_backends.py \
            --output build/closure-backend-parity.json
          test -s build/closure-backend-parity.json
          test -s build/legal-ir-catalogue/catalogue_build_manifest.json
          test -s build/legal-ir-catalogue/phase_ledger.json
          test -s build/legal-ir-catalogue/document_compilation_timings.json
          test -s build/legal-ir-catalogue/legal_pnf_probe/semantic_stage_timings.json

      - name: Produce persistent PostgreSQL snapshot
        shell: bash
        run: |
          mkdir -p build/catalogue-publish/state
          pg_dump --format=custom --no-owner --file build/catalogue-publish/postgres.dump "$DATABASE_URL"
          cp -a build/legal-ir-catalogue/. build/catalogue-publish/state/
          sha256sum build/catalogue-publish/postgres.dump > build/catalogue-publish/SHA256SUMS
          find build/catalogue-publish/state -type f -print0 | sort -z | xargs -0 sha256sum >> build/catalogue-publish/SHA256SUMS

      - name: Write Actions summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('build/legal-ir-catalogue/catalogue_build_manifest.json').read_text())
          timings = json.loads(Path('build/legal-ir-catalogue/document_compilation_timings.json').read_text())
          parity = json.loads(Path('build/closure-backend-parity.json').read_text())
          phase_rows = manifest.get('phase_summary', {})
          stage_rows = timings.get('aggregate', {}).get('stage_totals_ms', {})
          documents = timings.get('documents', [])
          slow = sorted(documents, key=lambda row: row.get('elapsed_ms', 0), reverse=True)[:10]
          runtime = manifest.get('runtime', {})
          lines = [
              '# AU driving Legal IR catalogue',
              '',
              f"- Catalogue: `{manifest['catalogue_ref']}`",
              f"- Existing tranche files retained: {manifest['existing_tranche_file_count']}",
              f"- AustLII documents fetched: {manifest['fetched_document_count']}",
              f"- PostgreSQL corpus: `{manifest['corpus_ref']}`",
              f"- PNF documents: {len(manifest['document_refs'])}",
              f"- Compilation failures: {len(manifest['failure_refs'])}",
              f"- Parser/document processes: {runtime.get('parser_document_processes')}",
              f"- Owner partitions per document: {runtime.get('owner_partitions_per_document')}",
              f"- Closure executors per document: {runtime.get('closure_executors_per_document')}",
              f"- Zelph parity lane: {parity.get('status')}",
              '- Bidirectional streaming: true',
              '- Identity promoted: false',
              '- Legal truth closed: false',
              '',
              '## Outer phase timing',
              '',
              '| Phase | Events | Elapsed ms | Failures |',
              '|---|---:|---:|---:|',
          ]
          for phase, row in sorted(phase_rows.items()):
              lines.append(f"| `{phase}` | {row['events']} | {row['elapsed_ms']} | {row['failed']} |")
          lines.extend(['', '## Nested semantic stage timing', '', '| Stage | Aggregate ms |', '|---|---:|'])
          for stage, elapsed in sorted(stage_rows.items(), key=lambda item: item[1], reverse=True):
              lines.append(f"| `{stage}` | {elapsed} |")
          lines.extend(['', '## Slowest document compilations', '', '| Document | State | Fixed point | Worker | Elapsed ms |', '|---|---|---|---|---:|'])
          for row in slow:
              lines.append(f"| `{row['document_ref']}` | {row['state']} | {row.get('local_fixed_point')} | `{row['worker']}` | {row['elapsed_ms']} |")
          Path(__import__('os').environ['GITHUB_STEP_SUMMARY']).write_text('\n'.join(lines) + '\n')
          PY

      - name: Publish stable catalogue branch
        shell: bash
        run: |
          rm -rf "$CATALOGUE_ROOT/catalogue/au-driving-v1"
          mkdir -p "$CATALOGUE_ROOT/catalogue/au-driving-v1"
          cp -a build/catalogue-publish/. "$CATALOGUE_ROOT/catalogue/au-driving-v1/"
          cd "$CATALOGUE_ROOT"
          git switch -C "$CATALOGUE_BRANCH"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add catalogue/au-driving-v1
          if git diff --cached --quiet; then
            echo "Catalogue unchanged"
          else
            git commit -m "Refresh AU driving Legal IR catalogue"
            git push origin "$CATALOGUE_BRANCH"
          fi

      - name: Upload build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: au-driving-legal-ir-catalogue-build
          path: |
            build/closure-backend-parity.json
            build/legal-ir-catalogue/catalogue_build_manifest.json
            build/legal-ir-catalogue/phase_ledger.json
            build/legal-ir-catalogue/document_compilation_timings.json
            build/legal-ir-catalogue/legal_pnf_probe/semantic_stage_timings.json
            build/legal-ir-catalogue/legal_pnf_probe/**
            build/catalogue-publish/SHA256SUMS
          if-no-files-found: warn
          retention-days: 30
