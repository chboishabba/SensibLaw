name: Reference binding

on:
  push:
    paths:
      - "src/pnf/**"
      - "src/policy/*corpus_compilation.py"
      - "src/policy/algebra/**"
      - "src/storage/postgres/**"
      - "database/postgres_migrations/**"
      - "scripts/*reference_binding*.py"
      - "tests/pnf/**"
      - "tests/policy/test_operational_corpus_compilation.py"
      - "tests/storage/test_*binding*.py"
      - "tests/storage/test_factor_revision_identity.py"
      - "tests/storage/test_operational_build_store.py"
      - ".github/workflows/reference-binding.yml"
  pull_request:
    paths:
      - "src/pnf/**"
      - "src/policy/*corpus_compilation.py"
      - "src/policy/algebra/**"
      - "src/storage/postgres/**"
      - "database/postgres_migrations/**"
      - "scripts/*reference_binding*.py"
      - "tests/pnf/**"
      - "tests/policy/test_operational_corpus_compilation.py"
      - "tests/storage/test_*binding*.py"
      - "tests/storage/test_factor_revision_identity.py"
      - "tests/storage/test_operational_build_store.py"
      - ".github/workflows/reference-binding.yml"

jobs:
  focused-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sensiblaw_compiler_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sensiblaw_compiler_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sensiblaw_compiler_ci
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: sensiblaw_compiler_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install environment
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --extra test --extra dev
          uv run python -m spacy download en_core_web_sm
      - name: Apply immutable migrations
        run: bash scripts/apply_pg_migrations.sh
      - name: Ruff
        run: |
          uv run ruff check \
            src/pnf \
            src/policy/operational_corpus_compilation.py \
            src/policy/postgres_corpus_compilation.py \
            src/policy/algebra/revision_identity.py \
            src/storage/postgres/binding_candidate_store.py \
            src/storage/postgres/factor_revision_store.py \
            src/storage/postgres/operational_build_store.py \
            src/storage/postgres/semantic_store.py \
            scripts/benchmark_binding_candidate_sets.py \
            scripts/inspect_reference_binding_case.py \
            scripts/report_binding_candidate_storage.py \
            tests/pnf \
            tests/policy/test_operational_corpus_compilation.py \
            tests/storage/test_binding_candidate_store.py \
            tests/storage/test_binding_migration_chain.py \
            tests/storage/test_factor_revision_identity.py \
            tests/storage/test_operational_build_store.py \
            tests/storage/test_postgres_reference_binding_live.py
      - name: Legacy compaction compatibility
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run pytest -x -vv tests/pnf/test_binding_candidate_sets.py \
            2>&1 | tee test-results/legacy-compaction.log
      - name: Inspect morphology candidate case
        run: |
          mkdir -p test-results
          uv run python scripts/inspect_reference_binding_case.py \
            "Engineers arrived. She spoke." \
            > test-results/morphology-candidate-case.json
      - name: Generic reference-binding corpus
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run pytest -x -vv tests/pnf/test_reference_binding_corpus.py \
            2>&1 | tee test-results/reference-corpus.log
      - name: Pairwise-free operational compiler
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run pytest -x -vv tests/policy/test_operational_corpus_compilation.py \
            2>&1 | tee test-results/operational-compiler.log
      - name: Revision and persistence invariants
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run pytest -x -vv \
            tests/storage/test_binding_candidate_store.py \
            tests/storage/test_binding_migration_chain.py \
            tests/storage/test_factor_revision_identity.py \
            tests/storage/test_operational_build_store.py \
            2>&1 | tee test-results/revision-persistence.log
      - name: Existing compiler regressions
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run pytest -x -vv \
            tests/language/test_semantic_reductions.py \
            tests/policy/test_corpus_compilation.py \
            tests/storage/test_postgres_compiler.py \
            tests/storage/test_postgres_generic_compiler_runtime.py \
            2>&1 | tee test-results/compiler-regressions.log
      - name: Live PostgreSQL proofs
        run: |
          mkdir -p test-results
          set -o pipefail
          uv run pytest -x -vv \
            tests/storage/test_postgres_compiler_live.py \
            tests/storage/test_postgres_reference_binding_live.py \
            2>&1 | tee test-results/live-postgres.log
      - name: Upload focused proof transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reference-binding-proof-logs
          path: |
            test-results/*.log
            test-results/*.json
          if-no-files-found: ignore
