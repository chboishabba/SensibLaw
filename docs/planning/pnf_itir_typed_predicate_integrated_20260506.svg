<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2023px" preserveAspectRatio="none" style="width:859px;height:2023px;background:#FFFFFF;" version="1.1" viewBox="0 0 859 2023" width="859px" zoomAndPan="magnify"><title>PDF Recitation: Latent Type Recovery from Text and Graph</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="408.1685" x="224.0603" y="34.9659">PDF Recitation: Latent Type Recovery from Text and Graph</text></g><ellipse cx="226.9742" cy="60.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><path d="M393.6767,80.0679 L393.6767,147.8056 L373.6767,151.8056 L393.6767,155.8056 L393.6767,223.5433 A0,0 0 0 0 393.6767,223.5433 L750.5494,223.5433 A0,0 0 0 0 750.5494,223.5433 L750.5494,90.0679 L740.5494,80.0679 L393.6767,80.0679 A0,0 0 0 0 393.6767,80.0679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M740.5494,80.0679 L740.5494,90.0679 L750.5494,90.0679 L740.5494,80.0679" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="101.4996" x="399.6767" y="100.0339">Page 1 witness:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.4095" x="399.6767" y="119.1018">- "I" = subject / agent</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.1952" x="399.6767" y="138.1697">- "walked" = predicate / action</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="160.1314" x="399.6767" y="157.2376">- "dog" = object / patient</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="237.0611" x="399.6767" y="176.3055">- cat / rat = nearby object-type fillers</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="3.64" x="399.6767" y="195.3734">&#160;</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="335.8727" x="399.6767" y="214.4414">The first move is role binding, not ontology lookup.</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="293.4049" x="80.2718" y="122.7377"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="273.4049" x="90.2718" y="147.7036">1. Natural language already has structure</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="184.4773" x="90.2718" y="166.7716">Example: "I walked the dog"</text><path d="M406.7107,239.0094 L406.7107,268.6113 L386.7107,272.6113 L406.7107,276.6113 L406.7107,306.2131 A0,0 0 0 0 406.7107,306.2131 L710.5936,306.2131 A0,0 0 0 0 710.5936,306.2131 L710.5936,249.0094 L700.5936,239.0094 L406.7107,239.0094 A0,0 0 0 0 406.7107,239.0094" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M700.5936,239.0094 L700.5936,249.0094 L710.5936,249.0094 L700.5936,239.0094" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="118.1736" x="412.7107" y="258.9753">Roles create slots.</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="189.1253" x="412.7107" y="278.0432">Slots imply acceptable fillers.</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="282.8829" x="412.7107" y="297.1111">Acceptable fillers create soft type pressure.</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="319.4729" x="67.2378" y="243.5433"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.1071" x="77.2378" y="268.5093">2. Predicate roles imply soft typing</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="299.4729" x="77.2378" y="287.5772">subject / predicate / object / typed participant</text><path d="M372.4598,316.2131 L372.4598,364.8829 L352.4598,368.8829 L372.4598,372.8829 L372.4598,421.5527 A0,0 0 0 0 372.4598,421.5527 L728.3666,421.5527 A0,0 0 0 0 728.3666,421.5527 L728.3666,326.2131 L718.3666,316.2131 L372.4598,316.2131 A0,0 0 0 0 372.4598,316.2131" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M718.3666,316.2131 L718.3666,326.2131 L728.3666,326.2131 L718.3666,316.2131" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.4517" x="378.4598" y="336.1791">Pages 2-5:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="308.6709" x="378.4598" y="355.247">- Wikidata assertions are useful but incomplete</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="295.3709" x="378.4598" y="374.3149">- domain pressure asks for stricter semantics</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="316.1748" x="378.4598" y="393.3828">- some needed constraints do not exist explicitly</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="334.9068" x="378.4598" y="412.4507">- strict typing is a local result, not the starting point</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="250.9711" x="101.4887" y="339.815"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="199.9612" x="111.4887" y="364.7809">3. Soft typing creates pressure</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="230.9711" x="111.4887" y="383.8489">where explicit ontology is too weak</text><path d="M426.7026,431.5527 L426.7026,575.5621 L406.7026,579.5621 L426.7026,583.5621 L426.7026,727.5715 A0,0 0 0 0 426.7026,727.5715 L744.3894,727.5715 A0,0 0 0 0 744.3894,727.5715 L744.3894,441.5527 L734.3894,431.5527 L426.7026,431.5527 A0,0 0 0 0 426.7026,431.5527" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M734.3894,431.5527 L734.3894,441.5527 L744.3894,441.5527 L734.3894,431.5527" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="128.8275" x="432.7026" y="451.5186">Clean 2025 pattern:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="296.6868" x="432.7026" y="470.5866">- Q126165306 = Uuden Musiikin Kilpailu 2025</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.0034" x="432.7026" y="489.6545">- instance of UMK edition</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.577" x="432.7026" y="508.7224">- part of series: Uuden Musiikin Kilpailu</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="232.0911" x="432.7026" y="527.7903">- part of: Finland in Eurovision 2025</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="3.64" x="432.7026" y="546.8582">&#160;</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.1834" x="432.7026" y="565.9261">Collapsed 2013 pattern:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="262.7509" x="432.7026" y="584.9941">- Q2226274 = Finland in Eurovision 2013</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="295.6088" x="432.7026" y="604.062">- aliases/description carry UMK2013 / UMK13</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="293.1029" x="432.7026" y="623.1299">- typing and series mix national participation</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="223.0051" x="439.9826" y="642.1978">with selection competition edition</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="3.64" x="432.7026" y="661.2657">&#160;</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.8317" x="432.7026" y="680.3336">Latent split:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="258.845" x="432.7026" y="699.4016">UMK 2013 -&gt; selects/supports/is part of</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="257.165" x="432.7026" y="718.4695">Finland's Eurovision 2013 participation.</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="359.4567" x="47.2459" y="550.4942"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="339.4567" x="57.2459" y="575.4601">4. Finland / UMK / Eurovision exposes layer collapse</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="301.4469" x="57.2459" y="594.528">selection competition != national participation</text><path d="M462.9485,737.5715 L462.9485,833.911 L442.9485,837.911 L462.9485,841.911 L462.9485,938.2506 A0,0 0 0 0 462.9485,938.2506 L784.7513,938.2506 A0,0 0 0 0 784.7513,938.2506 L784.7513,747.5715 L774.7513,737.5715 L462.9485,737.5715 A0,0 0 0 0 462.9485,737.5715" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M774.7513,737.5715 L774.7513,747.5715 L784.7513,747.5715 L774.7513,737.5715" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="132.0195" x="468.9485" y="757.5374">Q27968055 witness:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="261.7989" x="468.9485" y="776.6053">- current P279 includes Q1656682 event</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="275.239" x="476.2285" y="795.6732">and Q3331189 version/edition/translation</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="181.4393" x="468.9485" y="814.7411">- nearby diagnostic surface:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="289.4348" x="476.2285" y="833.8091">P31 / P279 / P1269 / P2738 / P11260 / P8225</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.3474" x="468.9485" y="852.877">- pressure is about order:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="293.5229" x="476.2285" y="871.9449">edition, event, metaclass, second-order class</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="99.7636" x="468.9485" y="891.0128">- safer posture:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.9472" x="476.2285" y="910.0807">underspecify via Q24017414</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="229.4311" x="476.2285" y="929.1487">rather than keep wrong superclass</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="431.9485" x="11" y="808.8431"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="291.9269" x="21" y="833.8091">5. Q27968055 exposes order/type pathology</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="411.9485" x="21" y="852.877">recurring event edition? event? metaclass? second-order class?</text><path d="M434.3816,948.2506 L434.3816,1054.1242 L414.3816,1058.1242 L434.3816,1062.1242 L434.3816,1167.9977 A0,0 0 0 0 434.3816,1167.9977 L748.1625,1167.9977 A0,0 0 0 0 748.1625,1167.9977 L748.1625,958.2506 L738.1625,948.2506 L434.3816,948.2506 A0,0 0 0 0 434.3816,948.2506" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M738.1625,948.2506 L738.1625,958.2506 L748.1625,958.2506 L738.1625,948.2506" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="150.7654" x="440.3816" y="968.2166">Pages 3-5 architecture:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.2095" x="440.3816" y="987.2845">Wikidata ontology</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="118.2155" x="440.3816" y="1006.3524">-&gt; latent structure</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.8797" x="440.3816" y="1025.4203">-&gt; residual</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="64.1057" x="440.3816" y="1044.4882">-&gt; feature</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="82.7117" x="440.3816" y="1063.5562">-&gt; constraint</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.4795" x="440.3816" y="1082.6241">-&gt; domain projector</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.1155" x="440.3816" y="1101.692">-&gt; reviewable signal</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="3.64" x="440.3816" y="1120.7599">&#160;</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="292.7809" x="440.3816" y="1139.8278">The system does not globally solve Wikidata.</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="235.1291" x="440.3816" y="1158.8957">It projects bounded repair surfaces.</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="374.8147" x="39.5669" y="1029.0563"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="354.8147" x="49.5669" y="1054.0222">6. Wikidata is too large and flat for direct global repair</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="259.853" x="49.5669" y="1073.0901">extract latent residual structure instead</text><path d="M420.6266,1177.9977 L420.6266,1283.8713 L400.6266,1287.8713 L420.6266,1291.8713 L420.6266,1397.7448 A0,0 0 0 0 420.6266,1397.7448 L730.7956,1397.7448 A0,0 0 0 0 730.7956,1397.7448 L730.7956,1187.9977 L720.7956,1177.9977 L420.6266,1177.9977 A0,0 0 0 0 420.6266,1177.9977" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M720.7956,1177.9977 L720.7956,1187.9977 L730.7956,1187.9977 L720.7956,1177.9977" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.4517" x="426.6266" y="1197.9637">Pages 6-8:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="176.5813" x="426.6266" y="1217.0316">- CAT -&gt; mammal -&gt; animal</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="289.1689" x="426.6266" y="1236.0995">- local graph reasoning over neighborhoods</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="263.199" x="426.6266" y="1255.1674">- Wikipedia text + Wikidata graph -&gt; PNF</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.7775" x="426.6266" y="1274.2353">- PNF -&gt; typed graph</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="225.3991" x="426.6266" y="1293.3032">- corpus search becomes evidence</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="205.6872" x="426.6266" y="1312.3712">- "where did I talk about dogs?"</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="279.8869" x="433.9066" y="1331.4391">can resolve through typed graph structure</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="3.64" x="426.6266" y="1350.507">&#160;</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="175.2093" x="426.6266" y="1369.5749">PNF is the carrier for roles,</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="275.0149" x="426.6266" y="1388.6428">qualifiers, provenance, and residual state.</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="347.3048" x="53.3219" y="1258.8033"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="322.2088" x="63.3219" y="1283.7693">7. PNF / ITIR becomes the typed predicate carrier</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="327.3048" x="63.3219" y="1302.8372">roles + qualifiers + provenance + graph alignment</text><path d="M441.1085,1407.7448 L441.1085,1475.4825 L421.1085,1479.4825 L441.1085,1483.4825 L441.1085,1551.2202 A0,0 0 0 0 441.1085,1551.2202 L847.289,1551.2202 A0,0 0 0 0 847.289,1551.2202 L847.289,1417.7448 L837.289,1407.7448 L441.1085,1407.7448 A0,0 0 0 0 441.1085,1407.7448" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M837.289,1407.7448 L837.289,1417.7448 L847.289,1417.7448 L837.289,1407.7448" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="75.4597" x="447.1085" y="1427.7107">Pages 8-10:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.1933" x="447.1085" y="1446.7787">- canonical article hierarchy</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="278.2769" x="447.1085" y="1465.8466">- Simple Wiki / ordinary Wikipedia contrast</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="237.2851" x="447.1085" y="1484.9145">- pressure + signal + locus of control</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="340.2128" x="447.1085" y="1503.9824">- binary, conditional, functional, and floating signals</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="378.1107" x="447.1085" y="1523.0503">- machine translation proposes cross-language mappings</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="385.1805" x="447.1085" y="1542.1182">- multilingual consistency exposes hidden type distinctions</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="388.2685" x="32.84" y="1450.4146"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="368.2685" x="42.84" y="1475.3805">8. Corpus and multilingual divergence become evidence</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="245.391" x="42.84" y="1494.4484">English collapse vs Finnish distinction</text><path d="M430.0276,1561.2202 L430.0276,1638.4919 L410.0276,1642.4919 L430.0276,1646.4919 L430.0276,1723.7636 A0,0 0 0 0 430.0276,1723.7636 L775.8964,1723.7636 A0,0 0 0 0 775.8964,1723.7636 L775.8964,1571.2202 L765.8964,1561.2202 L430.0276,1561.2202 A0,0 0 0 0 430.0276,1561.2202" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M765.8964,1561.2202 L765.8964,1571.2202 L775.8964,1571.2202 L765.8964,1561.2202" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="234.8771" x="436.0276" y="1581.1862">Outputs are not global truth claims.</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="3.64" x="436.0276" y="1600.2541">&#160;</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="219.8691" x="436.0276" y="1619.322">They are bounded review signals:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.5195" x="436.0276" y="1638.3899">- split collapsed entity</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="324.8688" x="436.0276" y="1657.4578">- underspecify instead of assert wrong superclass</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="159.9914" x="436.0276" y="1676.5257">- remove bad superclass</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.3214" x="436.0276" y="1695.5937">- hold for order review</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="198.6872" x="436.0276" y="1714.6616">- propose new relation or type</text><rect fill="#F8FAFC" height="58.1358" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="366.1067" x="43.9209" y="1613.424"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="346.1067" x="53.9209" y="1638.3899">9. Domain projector emits bounded repair proposals</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="331.3367" x="53.9209" y="1657.4578">split / underspecify / remove bad superclass / hold</text><path d="M418.9606,1748.7636 L418.9606,1806.9673 L398.9606,1810.9673 L418.9606,1814.9673 L418.9606,1873.1711 A0,0 0 0 0 418.9606,1873.1711 L794.7473,1873.1711 A0,0 0 0 0 794.7473,1873.1711 L794.7473,1758.7636 L784.7473,1748.7636 L418.9606,1748.7636 A0,0 0 0 0 418.9606,1748.7636" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><path d="M784.7473,1748.7636 L784.7473,1758.7636 L794.7473,1758.7636 L784.7473,1748.7636" fill="#FFF7ED" style="stroke:#C2410C;stroke-width:0.5;"/><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.5936" x="424.9606" y="1768.7295">General engine:</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="288.2029" x="424.9606" y="1787.7974">ITIR is a modular structural reasoning layer.</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="352.1267" x="424.9606" y="1806.8653">It converts language and weak graph data into typed,</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="354.7866" x="424.9606" y="1825.9332">provenance-bearing predicate envelopes, then checks</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="354.7867" x="424.9606" y="1845.0012">them against ontology, authority, domain constraints,</text><text fill="#1F2937" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="341.7807" x="424.9606" y="1864.0691">and corpus pressure before emitting review signals.</text><rect fill="#F8FAFC" height="134.4075" rx="12.5" ry="12.5" style="stroke:#334155;stroke-width:0.5;" width="343.9728" x="54.9879" y="1743.7636"/><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.6375" x="64.9879" y="1768.7295">Abstract mechanism</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="298.4929" x="64.9879" y="1787.7974">weak text/graph claim -&gt; predicate extraction</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="238.657" x="64.9879" y="1806.8653">-&gt; role binding -&gt; soft type inference</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="222.6411" x="64.9879" y="1825.9332">-&gt; ontology and corpus alignment</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="272.677" x="64.9879" y="1845.0012">-&gt; residual analysis -&gt; constraint pressure</text><text fill="#0F172A" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="323.9728" x="64.9879" y="1864.0691">-&gt; typed predicate envelope -&gt; bounded proposal</text><ellipse cx="226.9742" cy="1909.1711" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="226.9742" cy="1909.1711" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#475569;stroke-width:1;" x1="226.9742" x2="226.9742" y1="70.0679" y2="122.7377"/><polygon fill="#475569" points="222.9742,112.7377,226.9742,122.7377,230.9742,112.7377,226.9742,116.7377" style="stroke:#475569;stroke-width:1;"/><line style="stroke:#475569;stroke-width:1;" x1="226.9742" x2="226.9742" y1="180.8735" y2="243.5433"/><pol