ame="GMN53" data-source-line="89" id="ent0054"><path d="M661.51,532.4079 L661.51,595.526 L1024.4882,595.526 L1024.4882,542.4079 L1014.4882,532.4079 L661.51,532.4079" fill="#FEFFDD" style="stroke:#888888;stroke-width:0.5;"/><path d="M1014.4882,532.4079 L1014.4882,542.4079 L1024.4882,542.4079 L1014.4882,532.4079" fill="#FEFFDD" style="stroke:#888888;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.7161" x="667.51" y="551.3049">Duplicate-root rule:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="341.9782" x="667.51" y="569.0109">preserve the repeated proposition text as the claim root</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.1972" x="667.51" y="586.717">even when the richer alternate excerpt wins arbitration.</text></g><g class="entity" data-qualified-name="GMN56" data-source-line="95" id="ent0057"><path d="M1175.8,839.9179 L1175.8,876.3279 L629.75,880.3279 L1175.8,884.3279 L1175.8,920.742 A0,0 0 0 0 1175.8,920.742 L1522.2032,920.742 A0,0 0 0 0 1522.2032,920.742 L1522.2032,849.9179 L1512.2032,839.9179 L1175.8,839.9179 A0,0 0 0 0 1175.8,839.9179" fill="#FEFFDD" style="stroke:#888888;stroke-width:0.5;"/><path d="M1512.2032,839.9179 L1512.2032,849.9179 L1522.2032,849.9179 L1512.2032,839.9179" fill="#FEFFDD" style="stroke:#888888;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="155.6361" x="1181.8" y="858.8149">Current tested behaviors:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.0382" x="1181.8" y="876.5209">- promote duplicate-root alternate over context swap</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.4032" x="1181.8" y="894.227">- promote clause alternate when duplicate root exists</text><text fil